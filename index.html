<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CEP Primeiro — Coloca o CEP primeiro.</title>
  <meta name="description" content="Formulários brasileiros devem pedir o CEP antes de qualquer outro campo de endereço. São 8 dígitos. 4 campos preenchidos automaticamente.">
  <meta property="og:title" content="CEP Primeiro — Coloca o CEP primeiro.">
  <meta property="og:description" content="Formulários brasileiros devem pedir o CEP antes de qualquer outro campo de endereço. São 8 dígitos. 4 campos preenchidos automaticamente.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://bossolani.github.io/cep-primeiro/">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📍</text></svg>">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background: #0D0D0D;
      color: #E0E0E0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      line-height: 1.7;
      font-size: 18px;
    }

    main {
      max-width: 720px;
      margin: 0 auto;
      padding: 4rem 1.5rem;
    }

    section {
      margin-bottom: 5rem;
    }

    h1 {
      font-size: 2.8rem;
      color: #FFFFFF;
      line-height: 1.2;
      margin-bottom: 1.5rem;
    }

    h2 {
      font-size: 2rem;
      color: #FFFFFF;
      margin-bottom: 1.2rem;
    }

    p {
      margin-bottom: 1.2rem;
    }

    strong {
      color: #FFFFFF;
    }

    a {
      color: #00FF41;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    code {
      font-family: 'SF Mono', 'Fira Code', 'Fira Mono', 'Roboto Mono', monospace;
      background: #1A1A1A;
      padding: 0.15em 0.4em;
      border-radius: 4px;
      font-size: 0.9em;
    }

    pre {
      background: #1A1A1A;
      padding: 1.5rem;
      border-radius: 8px;
      overflow-x: auto;
      margin-bottom: 1.5rem;
      border: 1px solid #2A2A2A;
    }

    pre code {
      background: none;
      padding: 0;
      font-size: 0.85em;
      line-height: 1.6;
    }

    .highlight {
      color: #00FF41;
    }

    .shame {
      color: #C0392B;
    }

    footer {
      max-width: 720px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
      text-align: center;
      border-top: 1px solid #2A2A2A;
    }

    @media (max-width: 600px) {
      body {
        font-size: 16px;
      }

      h1 {
        font-size: 2rem;
      }

      h2 {
        font-size: 1.5rem;
      }

      main {
        padding: 2rem 1rem;
      }
    }
  </style>
</head>
<body>

  <header>
  </header>

  <main>
    <section id="hero">
    </section>

    <section id="oito-digitos">
    </section>

    <section id="demo">
    </section>

    <section id="muro-da-vergonha">
    </section>

    <section id="dicas">
    </section>

    <section id="fechamento">
    </section>
  </main>

  <footer>
  </footer>

</body>
</html>
